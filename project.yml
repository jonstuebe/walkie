name: Walkie
options:
  bundleIdPrefix: com.jonstuebe
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: 1
    DEVELOPMENT_TEAM: 5US3HNY357

targets:
  Walkie:
    type: application
    platform: iOS
    sources:
      - path: Walkie
    info:
      path: Walkie/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
          UIImageName: Splash
          UIImageRespectsSafeAreaInsets: false
        NSHealthShareUsageDescription: "Walkie reads your step count to keep your koala fed and happy."
        NSHealthUpdateUsageDescription: "Walkie needs access to your step data."
        UIBackgroundModes:
          - healthkit
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UNUserNotificationCenterDelegate: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconName: AppIcon
          CFBundleAlternateIcons:
            AppIcon-Brown:
              CFBundleIconName: AppIcon-Brown
              UIPrerenderedIcon: false
            AppIcon-Lavender:
              CFBundleIconName: AppIcon-Lavender
              UIPrerenderedIcon: false
            AppIcon-Mint:
              CFBundleIconName: AppIcon-Mint
              UIPrerenderedIcon: false
            AppIcon-Peach:
              CFBundleIconName: AppIcon-Peach
              UIPrerenderedIcon: false
            AppIcon-Slate:
              CFBundleIconName: AppIcon-Slate
              UIPrerenderedIcon: false
            AppIcon-Sand:
              CFBundleIconName: AppIcon-Sand
              UIPrerenderedIcon: false
            AppIcon-Pink:
              CFBundleIconName: AppIcon-Pink
              UIPrerenderedIcon: false
    entitlements:
      path: Walkie/Walkie.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
        com.apple.developer.healthkit.background-delivery: true
        com.apple.security.application-groups:
          - group.com.jonstuebe.petwalkie
    dependencies:
      - sdk: HealthKit.framework
      - target: WalkieWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonstuebe.petwalkie
        INFOPLIST_FILE: Walkie/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES

  WalkieTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WalkieTests
    dependencies:
      - target: Walkie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonstuebe.petwalkie.tests
        GENERATE_INFOPLIST_FILE: YES

  WalkieWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: WalkieWidget
        excludes:
          - "**/.DS_Store"
      - path: Walkie/Shared
      - path: Walkie/Models/PetColor.swift
      - path: Walkie/Views/KoalaView.swift
    info:
      path: WalkieWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: WalkieWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jonstuebe.petwalkie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonstuebe.petwalkie.WalkieWidgetExtension
        INFOPLIST_FILE: WalkieWidget/Info.plist
        TARGETED_DEVICE_FAMILY: 1

schemes:
  Walkie:
    build:
      targets:
        Walkie: all
        WalkieTests: [test]
    test:
      targets:
        - WalkieTests
      gatherCoverageData: false
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

  # Runs the optimized Release build on device — pick this from the scheme
  # dropdown to test the production build without touching the Debug scheme.
  Walkie-Release:
    build:
      targets:
        Walkie: all
    run:
      config: Release
    profile:
      config: Release
    archive:
      config: Release
